# VARIABLES DE CONFIGURACION

# APLICACION
application_name: VucanAI
application_version: 2.0

# ANALISIS
analysis_max_files: 500
analysis_min_attack_accuracy: 0.40

# INFORMES
reporting_output_dir: reports

# ARRANQUE
host: 0.0.0.0
port: 5000
debug: false

# MODELOS
modelo1: OpenAI
modelo2: Gemini
openai_model: gpt-4o-mini
gemini_model: gemini-2.5-flash

# TIMEOUT DE LLAMADAS A LAS API
timeout_openai: 20
timeout_gemini: 10

