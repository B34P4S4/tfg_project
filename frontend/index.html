<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VucanAI 2.0</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Cytoscape -->
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    

</head>

<body>

    <h1>VucanAI</h1>
    <h3>Detección de vulnerabilidades de código con IA agentica multimodelo</h3>


<div class="container">
    <p class="instructions">
        Introduce la ruta del proyecto y ejecuta el análisis:
    </p>
    <div class="search-box">

        <input
            type="text"
            id="ruta"
            placeholder="Ruta del proyecto..."
        >

        <button id="btnAnalizar">
            Analizar
        </button>

    </div>   

    <div id="loading" class="loading hidden">
        Procesando análisis...
    </div>

    <div id="errorBox" class="error hidden"></div>

    <div id="dashboard" class="hidden">

        <div class="top-bar">

            <div class="tabs">

                <button class="tab active" data-tab="vulnerabilidades">
                    Vulnerabilidades
                </button>

                <button class="tab" data-tab="ataques">
                    Ataques
                </button>

                <button class="tab" data-tab="correlaciones">
                    Correlaciones
                </button>

            </div>

            <button id="btnExportar" class="export-btn hidden">
                Exportar Informe PDF
            </button>
            
        </div>

        <div id="vulnerabilidades" class="tab-content active"></div>

        <div id="ataques" class="tab-content"></div>

        <div id="correlaciones" class="tab-content">

            <div id="correlationGraph"></div>
            <div class="legend">

                <div class="legend-item">
                    <div class="vul-color"></div>
                    Vulnerabilidad
                </div>

                <div class="legend-item">
                    <div class="attack-color"></div>
                    Ataque
                </div>                

            </div>
            <div id="graphDetails" class="graph-details">

                <h3>Detalles</h3>

                <div id="detailsContent">
                    Selecciona un nodo...
                </div>

            </div>            

        </div>        

    </div>

</div>

<script src="js/functions.js"></script>

</body>
</html>
